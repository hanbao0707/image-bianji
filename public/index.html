<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 背景移除 - 一键抠图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
    }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: #f8f9ff;
    }

    .upload-area:hover {
      border-color: #764ba2;
      background: #f0f2ff;
    }

    .upload-area.dragover {
      border-color: #764ba2;
      background: #e8ebff;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .upload-text {
      color: #666;
      margin-bottom: 10px;
    }

    .upload-hint {
      color: #999;
      font-size: 0.9em;
    }

    #fileInput {
      display: none;
    }

    .preview-container {
      display: none;
      margin-top: 30px;
    }

    .preview-container.active {
      display: block;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .preview-box {
      text-align: center;
    }

    .preview-box h3 {
      color: #333;
      margin-bottom: 10px;
      font-size: 1em;
    }

    .preview-box img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 10px;
      border: 1px solid #eee;
      background: repeating-conic-gradient(#f0f0f0 0% 25%, white 0% 50%) 50% / 20px 20px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .status {
      text-align: center;
      margin-top: 15px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .status.active {
      display: block;
    }

    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
    }

    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .download-section {
      display: none;
      margin-top: 20px;
      text-align: center;
    }

    .download-section.active {
      display: block;
    }

    .download-btn {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      color: #999;
      font-size: 0.85em;
    }

    @media (max-width: 500px) {
      .preview-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 AI 背景移除</h1>
    <p class="subtitle">一键智能抠图，秒出透明背景图</p>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📷</div>
      <p class="upload-text">点击或拖拽图片到这里</p>
      <p class="upload-hint">支持 JPG、PNG，最大 10MB</p>
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <div class="preview-container" id="previewContainer">
      <div class="preview-grid">
        <div class="preview-box">
          <h3>原始图片</h3>
          <img id="originalPreview" src="" alt="原图">
        </div>
        <div class="preview-box">
          <h3>抠图结果</h3>
          <img id="resultPreview" src="" alt="结果">
        </div>
      </div>
    </div>

    <div class="status" id="status"></div>

    <div class="download-section" id="downloadSection">
      <a class="download-btn" id="downloadBtn" download="nobg.png">⬇️ 下载透明背景图</a>
    </div>

    <button class="btn btn-primary" id="submitBtn" disabled>开始抠图</button>
    <button class="btn btn-secondary" id="resetBtn" style="display:none;">重新上传</button>

    <p class="footer">Powered by 腾讯云 COS 数据万象</p>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const previewContainer = document.getElementById('previewContainer');
    const originalPreview = document.getElementById('originalPreview');
    const resultPreview = document.getElementById('resultPreview');
    const status = document.getElementById('status');
    const downloadSection = document.getElementById('downloadSection');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;

    // 点击上传区域
    uploadArea.addEventListener('click', () => fileInput.click());

    // 文件选择
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) {
        handleFile(e.target.files[0]);
      }
    });

    // 拖拽上传
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) {
        handleFile(e.dataTransfer.files[0]);
      }
    });

    // 处理文件
    function handleFile(file) {
      if (!file.type.startsWith('image/')) {
        showStatus('请上传图片文件', 'error');
        return;
      }

      if (file.size > 10 * 1024 * 1024) {
        showStatus('图片大小不能超过 10MB', 'error');
        return;
      }

      selectedFile = file;

      // 预览原图
      const reader = new FileReader();
      reader.onload = (e) => {
        originalPreview.src = e.target.result;
        resultPreview.src = '';
        previewContainer.classList.add('active');
        downloadSection.classList.remove('active');
        submitBtn.disabled = false;
        resetBtn.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    // 提交抠图
    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      submitBtn.disabled = true;
      showStatus('<span class="spinner"></span>AI 正在处理中，请稍候...', 'loading');

      const formData = new FormData();
      formData.append('image', selectedFile);

      try {
        const response = await fetch('/api/remove-bg', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (data.success) {
          resultPreview.src = data.resultUrl;
          downloadBtn.href = data.resultUrl;
          downloadSection.classList.add('active');
          showStatus('✅ 背景移除成功！', 'success');
        } else {
          showStatus('处理失败: ' + (data.error || '未知错误'), 'error');
        }
      } catch (err) {
        showStatus('网络错误: ' + err.message, 'error');
      }

      submitBtn.disabled = false;
    });

    // 重置
    resetBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      previewContainer.classList.remove('active');
      downloadSection.classList.remove('active');
      status.classList.remove('active');
      submitBtn.disabled = true;
      resetBtn.style.display = 'none';
    });

    // 显示状态
    function showStatus(message, type) {
      status.innerHTML = message;
      status.className = 'status active ' + type;
    }
  </script>
</body>
</html>
